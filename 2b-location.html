<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>HELORA — Screen 2B · Your Location</title>
<style>
  /* HELORA Screen 2B (Your Location)
     Canvas #000  · Card #0A0D12
     Action: Red #CB3947 · Blue #4E82C9 · Amber #D39D35
     Brand (white surfaces only): Navy #253F6C · Red #C5152A
     action colors on black; brand colors only on the white lockup; no green; inline SVG icons. */
  :root{
    --black:#000;--act-red:#CB3947;--act-blue:#4E82C9;--act-amber:#D39D35;
    --line:rgba(255,255,255,.07);--muted:#8A93A1;--white:#F4F6FA;--sub:#9DB0C9;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--black);color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .screen{max-width:440px;margin:0 auto;background:var(--black);
    min-height:100vh;            /* fallback for older browsers */
    min-height:100dvh;           /* true device canvas: accounts for browser UI showing/hiding */
    display:flex;flex-direction:column;gap:11px;
    padding-top:max(10px, env(safe-area-inset-top));
    padding-right:max(16px, env(safe-area-inset-right));
    padding-bottom:max(16px, env(safe-area-inset-bottom));
    padding-left:max(16px, env(safe-area-inset-left));}

  /* header lockup (real asset) + live Back */
  .lockup{position:relative;width:100%;}
  .lockup img{width:100%;height:auto;display:block;border-radius:22px;}
  .back{position:absolute;left:10px;right:78.86%;top:50%;transform:translateY(-50%);
    display:flex;align-items:center;justify-content:center;gap:5px;color:var(--act-red);
    font-weight:700;font-size:15px;cursor:pointer;
    background:transparent;border:none;font-family:inherit;padding:0;}
  .back svg{width:15px;height:15px;stroke:var(--act-red);fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;}

  /* map block (framed raster: YOUR LOCATION header + bordered map + pin + chrome baked in) */
  .mapblock{width:100%;display:flex;justify-content:center;}
  .mapblock img{max-width:100%;max-height:300px;width:auto;height:auto;display:block;}

  /* info rows */
  .info{display:flex;flex-direction:column;margin-top:0;}
  .row{display:flex;align-items:center;gap:14px;padding:9px 4px;border-top:1px solid var(--line);}
  .row:first-child{border-top:none;}
  .row .ic{width:34px;flex:0 0 34px;display:flex;justify-content:center;}
  .row .ic svg{width:27px;height:27px;}
  .row .body{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--act-blue);display:flex;align-items:center;gap:8px;}
  .eyebrow .sep{color:var(--act-amber);font-weight:400;}
  .value{font-size:17px;color:var(--white);font-weight:500;display:flex;align-items:center;gap:9px;}
  .value .sep{color:var(--act-amber);font-weight:300;}
  /* GPS coordinates: row-consistent size, thinner weight (less chunky), one line, extra gap around the divider */
  .value.gps{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    font-size:17px;font-weight:400;letter-spacing:.01em;white-space:nowrap;gap:13px;}

  /* QUICK REACH — blue home-screen card */
  .quick{width:100%;background:rgba(8,12,20,.55);border:1.5px solid var(--act-blue);border-radius:16px;
    box-shadow:0 0 0 .5px rgba(78,130,201,.30),0 0 22px -8px rgba(78,130,201,.6);
    padding:11px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;margin-top:2px;}
  .quick .badge{width:46px;height:46px;flex:0 0 46px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%,rgba(78,130,201,.34),rgba(78,130,201,.12));
    border:1.5px solid rgba(78,130,201,.6);display:flex;align-items:center;justify-content:center;}
  .quick .badge svg{width:26px;height:26px;fill:#fff;}
  .quick .qbody{flex:1;display:flex;flex-direction:column;gap:1px;}
  .quick .qtitle{color:#fff;font-size:20px;font-weight:700;letter-spacing:.01em;line-height:1.05;}
  .quick .qsub{color:var(--sub);font-size:13px;font-weight:400;}
  .quick .chev{flex:0 0 auto;}
  .quick .chev svg{width:18px;height:18px;stroke:var(--act-blue);fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;}

  /* reassurance */
  .reassure{display:flex;align-items:center;gap:10px;justify-content:center;color:var(--muted);font-size:13px;line-height:1.25;}
  .reassure svg{width:19px;height:19px;fill:var(--muted);opacity:.65;flex:0 0 auto;}

  /* bottom share */
  .sharerow{display:flex;justify-content:center;margin-top:4px;padding-top:2px;position:relative;}
  .share-cover{position:absolute;inset:0;background:var(--black);border-radius:22px;}
  .sharebtn{background:#15181E;border:none;border-radius:22px;padding:10px 30px;
    display:flex;align-items:center;gap:9px;color:var(--white);font-size:15px;font-weight:600;cursor:pointer;}
  .sharebtn svg{width:16px;height:16px;stroke:var(--white);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
</style>
</head>
