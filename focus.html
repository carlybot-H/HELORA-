<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HELORA – Focus Breather</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background-color: #0a1628;
      min-height: 100%;
      width: 100%;
    }

    /* SCREENS */
    .screen {
      display: none;
      min-height: 100vh;
      width: 100%;
      background-color: #0a1628;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    /* ── BACK CONTROL ── */
    .back{
      position:absolute;
      top:max(18px, env(safe-area-inset-top));
      left:18px;
      display:flex;
      align-items:center;
      gap:5px;
      color:rgba(255,255,255,0.55);
      font-family:'Lato',sans-serif;
      font-size:15px;
      font-weight:400;
      background:transparent;
      border:none;
      cursor:pointer;
      padding:8px 6px;
      z-index:5;
      transition:opacity .2s ease;
    }
    .back:active{ opacity:0.6; }
    .back svg{width:15px;height:15px;stroke:rgba(255,255,255,0.55);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}

    /* ── BREATHER SCREEN ── */
    .bg-glow {
      position: absolute;
      top: 38%; left: 50%;
      transform: translate(-50%, -50%);
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(197,21,42,0.09) 0%, transparent 68%);
      animation: bgBreath 4s ease-in-out infinite;
      pointer-events: none;
    }
    .icon-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 52px;
      padding: 60px;
    }
    .halo {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      width: 58px; height: 58px;
      left: 50%; top: 50%;
      margin-left: -29px; margin-top: -29px;
    }
    .halo-inner {
      background: radial-gradient(circle, rgba(197,21,42,0.8) 0%, rgba(197,21,42,0) 70%);
      animation: haloInner 4s ease-in-out infinite;
    }
    .halo-mid {
      background: radial-gradient(circle, rgba(197,21,42,0.53) 0%, rgba(197,21,42,0) 70%);
      animation: haloMid 4s ease-in-out infinite;
    }
    .halo-outer {
      background: radial-gradient(circle, rgba(197,21,42,0.33) 0%, rgba(197,21,42,0) 70%);
      animation: haloOuter 4s ease-in-out infinite;
    }
    .dot-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .red-dot {
      animation: dotBreathe 4s ease-in-out infinite;
      transform-origin: 90.89px 85.57px;
    }
    .message-list {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .message-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .message {
      font-size: 21px;
      font-weight: 400;
      color: #ffffff;
      line-height: 1.5;
      text-align: center;
      padding: 12px 40px;
      user-select: none;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.8s ease, transform 1.8s ease;
    }
    .message.visible { opacity: 1; transform: translateY(0); }
    .divider {
      width: 36px;
      height: 1px;
      background: #b8924a;
      border-radius: 1px;
      margin-bottom: 4px;
      transform-origin: center;
      opacity: 0;
      transform: scaleX(0);
      transition: opacity 1.6s ease, transform 1.6s ease;
    }
    .divider.visible { opacity: 0.6; transform: scaleX(1); }

    .notify-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 48px;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.8s ease, transform 1.8s ease;
    }
    .notify-wrap.visible { opacity: 1; transform: translateY(0); }
    .notify-label {
      font-size: 18px;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.01em;
    }
    .notify-buttons { display: flex; gap: 16px; }
    .btn {
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      font-weight: 400;
      padding: 11px 32px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s ease;
    }
    .btn:active { opacity: 0.75; }
    .btn-notify { background-color: #ffffff; color: #0a1628; }
    .btn-skip {
      background-color: transparent;
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.2);
    }



    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotBreathe {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.11); }
      100% { transform: scale(1); }
    }
    @keyframes haloInner {
      0%   { transform: scale(1);    opacity: 0.55; }
      50%  { transform: scale(1.55); opacity: 0.22; }
      100% { transform: scale(1);    opacity: 0.55; }
    }
    @keyframes haloMid {
      0%   { transform: scale(1);    opacity: 0.28; }
      50%  { transform: scale(1.90); opacity: 0.10; }
      100% { transform: scale(1);    opacity: 0.28; }
    }
    @keyframes haloOuter {
      0%   { transform: scale(1);    opacity: 0.12; }
      50%  { transform: scale(2.50); opacity: 0.03; }
      100% { transform: scale(1);    opacity: 0.12; }
    }
    @keyframes bgBreath {
      0%, 100% { opacity: 0.18; }
      50%      { opacity: 0.35; }
    }
  </style>
</head>
<body>

  <!-- ── SCREEN 1: BREATHER ── -->
  <div class="screen active" id="screenBreather">
    <button class="back" onclick="window.location.href='2b-location.html'" aria-label="Back to your location">
      <svg viewBox="0 0 24 24"><polyline points="15 5 8 12 15 19"/></svg>Back
    </button>
    <div class="bg-glow"></div>
    <div class="icon-wrap">
      <div class="halo halo-outer"></div>
      <div class="halo halo-mid"></div>
      <div class="halo halo-inner"></div>
      <div class="dot-wrap" id="secretTap" onclick="handleSecretTap()">
        <svg viewBox="0 0 180 180" width="90" height="90" xmlns="http://www.w3.org/2000/svg">
          <path fill="#ffffff" d="M34.33,173.91H4.76c-1.52,0-2.74-1.23-2.74-2.74V8.83c0-1.52,1.23-2.74,2.74-2.74h29.56
            c1.52,0,2.74,1.23,2.74,2.74v162.33C37.07,172.68,35.84,173.91,34.33,173.91z"/>
          <path fill="#ffffff" d="M175.24,173.91h-29.56c-1.52,0-2.74-1.23-2.74-2.74V8.83c0-1.52,1.23-2.74,2.74-2.74h29.56
            c1.52,0,2.74,1.23,2.74,2.74v162.33C177.98,172.68,176.75,173.91,175.24,173.91z"/>
          <circle class="red-dot" cx="90.89" cy="85.57" r="28.86" fill="#C5152A"/>
        </svg>
      </div>
    </div>
    <div class="message-list">
      <div class="message-block">
        <div class="message" id="msg0">Stay on the line.</div>
        <div class="divider" id="div0"></div>
      </div>
      <div class="message-block">
        <div class="message" id="msg1">Listen to the dispatcher.</div>
        <div class="divider" id="div1"></div>
      </div>
      <div class="message-block">
        <div class="message" id="msg2">Keep your eyes open.</div>
        <div class="divider" id="div2"></div>
      </div>
      <div class="message-block">
        <div class="message" id="msg3">Help is on the way…</div>
      </div>
    </div>
    <div class="notify-wrap" id="notifyWrap">
      <div class="notify-label">Let your people know?</div>
      <div class="notify-buttons">
        <button class="btn btn-notify" onclick="handleNotify()">Notify</button>
        <button class="btn btn-skip" onclick="handleNotNow()">Not Now</button>
      </div>
    </div>
  </div>

    <script>
    const MESSAGE_DELAYS = [4000, 9000, 14000, 19000];
    const DIVIDER_DELAYS = [5000, 10000, 15000];
    const NOTIFY_DELAY   = 60000;   // 1 minute
    const AUTO_ADVANCE   = 180000;  // 3 minutes

    let autoTimer = null;

    // 25002500 SECRET HANDSHAKE 25002500
    // Triple-tap the HELORA logo to skip the wait and show notify prompt instantly
    let secretTapCount = 0;
    let secretTapTimer = null;
    let notifyTimer = null;
    function handleSecretTap() {
      secretTapCount++;
      clearTimeout(secretTapTimer);
      secretTapTimer = setTimeout(() => { secretTapCount = 0; }, 600);
      if (secretTapCount >= 3) {
        secretTapCount = 0;
        clearTimeout(secretTapTimer);
        clearTimeout(notifyTimer);
        clearTimeout(autoTimer);
        const el = document.getElementById('notifyWrap');
        if (el) el.classList.add('visible');
        autoTimer = setTimeout(() => goToResponder(), AUTO_ADVANCE);
      }
    }

    MESSAGE_DELAYS.forEach((delay, i) => {
      setTimeout(() => {
        const el = document.getElementById('msg' + i);
        if (el) el.classList.add('visible');
      }, delay);
    });

    DIVIDER_DELAYS.forEach((delay, i) => {
      setTimeout(() => {
        const el = document.getElementById('div' + i);
        if (el) el.classList.add('visible');
      }, delay);
    });

    // Show notify prompt at 1 minute
    notifyTimer = setTimeout(() => {
      const el = document.getElementById('notifyWrap');
      if (el) el.classList.add('visible');
    }, NOTIFY_DELAY);

    // Auto-advance to medical info at 3 minutes if no response
    autoTimer = setTimeout(() => goToResponder(), AUTO_ADVANCE);

    // Path 1: Notify → Quick Reach
    function handleNotify() {
      clearTimeout(notifyTimer);
      clearTimeout(autoTimer);
      window.location.href = 'quick-reach.html';
    }

    // Path 2: Not Now → Responder screen
    function handleNotNow() {
      clearTimeout(notifyTimer);
      clearTimeout(autoTimer);
      window.location.href = 'responder-view.html';
    }

    // Path 3: No response after 3 min → Responder screen
    function goToResponder() {
      window.location.href = 'responder-view.html';
    }
  </script>
</body>
</html>
