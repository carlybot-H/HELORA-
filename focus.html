  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --canvas: #0a1628;
      --white:  #FEFEFE;
      --action-red: #CB3947;
      --action-amber: #D39D35;
      --action-blue: #4E82C9;
      --green-reassure: #8FB37E;
    }

    html, body {
      background-color: var(--canvas) !important;
      background: var(--canvas) !important;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: max(56px, env(safe-area-inset-top) + 40px);
      padding-bottom: calc(env(safe-area-inset-bottom) + 40px);
      font-family: 'Lato', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .back {
      position: absolute;
      top: max(18px, env(safe-area-inset-top));
      left: 18px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.55);
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      font-weight: 400;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 6px;
      z-index: 5;
    }
    .back:active { opacity: 0.6; }
    .back svg { width: 15px; height: 15px; stroke: rgba(255,255,255,0.55); fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

    .bg-glow {
      position: absolute;
      top: 14%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(203,57,71,0.10) 0%, transparent 68%);
      animation: bgBreath 4s ease-in-out infinite;
      pointer-events: none;
    }

    .icon-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      padding: 24px;
    }

    .halo {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      width: 58px;
      height: 58px;
      left: 50%;
      top: 50%;
      margin-left: -29px;
      margin-top: -29px;
    }
    .halo-inner { background: radial-gradient(circle, rgba(203,57,71,0.80) 0%, rgba(203,57,71,0) 70%); animation: haloInner 4s ease-in-out infinite; }
    .halo-mid   { background: radial-gradient(circle, rgba(203,57,71,0.53) 0%, rgba(203,57,71,0) 70%); animation: haloMid 4s ease-in-out infinite; }
    .halo-outer { background: radial-gradient(circle, rgba(203,57,71,0.33) 0%, rgba(203,57,71,0) 70%); animation: haloOuter 4s ease-in-out infinite; }

    .dot-wrap { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }

    #helora-dot { animation: dotBreathe 4s ease-in-out infinite; transform-origin: 90.89px 85.57px; }

    @keyframes dotBreathe { 0%{transform:scale(1);} 50%{transform:scale(1.11);} 100%{transform:scale(1);} }
    @keyframes haloInner { 0%{transform:scale(1);opacity:.55;} 50%{transform:scale(1.55);opacity:.22;} 100%{transform:scale(1);opacity:.55;} }
    @keyframes haloMid   { 0%{transform:scale(1);opacity:.28;} 50%{transform:scale(1.90);opacity:.10;} 100%{transform:scale(1);opacity:.28;} }
    @keyframes haloOuter { 0%{transform:scale(1);opacity:.12;} 50%{transform:scale(2.50);opacity:.03;} 100%{transform:scale(1);opacity:.12;} }
    @keyframes bgBreath  { 0%,100%{opacity:.18;} 50%{opacity:.35;} }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--action-amber);
      text-align: center;
      margin-bottom: 28px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 1.6s ease, transform 1.6s ease;
    }
    .eyebrow.visible { opacity: 1; transform: translateY(0); }

    .message-list { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .message-block { display: flex; flex-direction: column; align-items: center; }

    .message {
      font-size: 20px;
      font-weight: 400;
      color: var(--white);
      line-height: 1.4;
      text-align: center;
      padding: 9px 40px;
      user-select: none;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.8s ease, transform 1.8s ease;
    }
    .message.visible { opacity: 1; transform: translateY(0); }

    .divider {
      width: 36px;
      height: 1px;
      background: var(--action-amber);
      border-radius: 1px;
      margin-bottom: 2px;
      transform-origin: center;
      opacity: 0;
      transform: scaleX(0);
      transition: opacity 1.6s ease, transform 1.6s ease;
    }
    .divider.visible { opacity: 0.6; transform: scaleX(1); }

    .final-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -14px;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 2s ease, transform 2s ease;
      pointer-events: none;
    }
    .final-block.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .final-prompt {
      font-size: 20px;
      font-weight: 400;
      color: var(--white);
      text-align: center;
      padding: 9px 40px;
      user-select: none;
      margin-bottom: 12px;
    }

    .button-row { display: flex; flex-direction: row; gap: 12px; }

    .btn {
      background: transparent;
      border: 1px solid rgba(211,157,53,0.6);
      border-radius: 24px;
      color: var(--white);
      font-family: 'Lato', sans-serif;
      font-size: 17px;
      font-weight: 400;
      padding: 10px 32px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .btn:active { background: rgba(211,157,53,0.2); border-color: var(--action-amber); }
    .btn-notify { border-color: rgba(78,130,201,0.6); }
    .btn-notify:active { background: rgba(78,130,201,0.2); border-color: var(--action-blue); }

    .btn-call {
      border-color: rgba(203,57,71,0.6);
      margin-top: 4px;
    }
    .btn-call:active { background: rgba(203,57,71,0.2); border-color: var(--action-red); }

    .call-again {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 1.8s ease, transform 1.8s ease;
    }
    .call-again.visible { opacity: 1; transform: translateY(0); }

    .btn-continue {
      background: rgba(143,179,126,0.15);
      border: 1.5px solid rgba(143,179,126,0.6);
      border-radius: 24px;
      color: var(--white);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 12px 40px;
      cursor: pointer;
    }
    .btn-continue:active { background: rgba(143,179,126,0.28); }
  </style>
</head>
<body>
<div style="position:fixed;inset:0;background:#0a1628;z-index:-1;"></div>

  <button class="back" onclick="window.history.back()" aria-label="Back">
    <svg viewBox="0 0 24 24"><polyline points="15 5 8 12 15 19"/></svg>Back
  </button>

  <div class="bg-glow"></div>

  <div class="icon-wrap">
    <div class="halo halo-outer"></div>
    <div class="halo halo-mid"></div>
    <div class="halo halo-inner"></div>
    <div class="dot-wrap">
      <svg viewBox="0 0 180 180" width="90" height="90" xmlns="http://www.w3.org/2000/svg">
        <path fill="#ffffff" d="M34.33,173.91H4.76c-1.52,0-2.74-1.23-2.74-2.74V8.83c0-1.52,1.23-2.74,2.74-2.74h29.56
          c1.52,0,2.74,1.23,2.74,2.74v162.33C37.07,172.68,35.84,173.91,34.33,173.91z"/>
        <path fill="#ffffff" d="M175.24,173.91h-29.56c-1.52,0-2.74-1.23-2.74-2.74V8.83c0-1.52,1.23-2.74,2.74-2.74h29.56
          c1.52,0,2.74,1.23,2.74,2.74v162.33C177.98,172.68,176.75,173.91,175.24,173.91z"/>
        <circle id="helora-dot" cx="90.89" cy="85.57" r="28.86" fill="#CB3947"/>
      </svg>
    </div>
  </div>

  <div class="eyebrow" id="eyebrow">FOCUS</div>

  <div class="message-list">
    <div class="message-block">
      <div class="message" id="msg-0">Your call with 911 is disconnected.</div>
      <div class="divider" id="div-0"></div>
    </div>

    <!-- Fast redial: kept separate from Back so Back stays consistent
         (plain history-back) with every other HELORA screen. -->
    <div class="call-again" id="callAgain">
      <button class="btn btn-call" onclick="window.location.href='tel:911'">Call 911 Again?</button>
    </div>

    <div class="message-block">
      <div class="message" id="msg-1">Follow dispatcher instructions.</div>
      <div class="divider" id="div-1"></div>
    </div>
    <div class="message-block">
      <div class="message" id="msg-2">Take one thing at a time.</div>
      <div class="divider" id="div-2"></div>
    </div>
    <div class="message-block">
      <div class="message" id="msg-3">Be aware of your surroundings.</div>
      <div class="divider" id="div-3"></div>
    </div>
    <div class="message-block">
      <div class="message" id="msg-4">Secure pets when possible.</div>
      <div class="divider" id="div-4"></div>
    </div>
    <div class="message-block">
      <div class="message" id="msg-5">Keep your phone nearby.</div>
      <div class="divider" id="div-5"></div>
    </div>
    <div class="message-block">
      <div class="message" id="msg-6">Stay someplace safe where help can find you.</div>
      <div class="divider" id="div-6"></div>
    </div>
    <div class="message-block">
      <div class="message" id="msg-7">Do not take unnecessary risks.</div>
      <div class="divider" id="div-7"></div>
    </div>

    <!-- Shown only if Quick Reach has not already been visited this flow -->
    <div class="final-block" id="finalBlockContact">
      <div class="final-prompt">Let your people know?</div>
      <div class="button-row">
        <button class="btn btn-notify" onclick="try{sessionStorage.setItem('helora_qrReturn','responder-view.html');}catch(e){} window.location.href='quick-reach.html'">Notify</button>
        <button class="btn" onclick="window.location.href='responder-view.html'">Not Now</button>
      </div>
    </div>

    <!-- Shown instead, if Quick Reach was already visited -->
    <div class="final-block" id="finalBlockContinue">
      <button class="btn-continue" onclick="window.location.href='responder-view.html'">CONTINUE</button>
    </div>
  </div>

  <script>
    // Quick Reach sets this flag on load. If it's set, this flow
    // already asked "let your people know?" once — don't ask again.
    let quickReachVisited = false;
    try {
      quickReachVisited = sessionStorage.getItem('helora_quickReachVisited') === 'true';
    } catch (e) {
      // sessionStorage unavailable (e.g. private browsing) — default
      // to showing the contact prompt rather than silently skipping it.
      quickReachVisited = false;
    }

    // ────────────────────────────────────────────────────────────────
    // DEMO DISCLAIMER — "Your call with dispatch has ended." (msg-0)
    // This screen's opening line asserts the 911 call has ended. That
    // claim is only true because, in this prototype, the *only* path
    // into focus.html is breather.html's simulated disconnect timer
    // (see the PROVISO comment in breather.html). This page does not
    // independently verify call state — it trusts whoever navigated
    // it here. In the native app, this line should only render once
    // CallKit's CXCallObserver actually reports the call has ended;
    // until that's wired up, loading this file directly (e.g. via a
    // bookmarked URL during testing) will show "call has ended" copy
    // even though no call took place.
    // ────────────────────────────────────────────────────────────────

    // ── message reveal timing (demo timing) ──
    const msgDelays = [1300, 2050, 3250, 4500, 5750, 7000, 8250, 9500];
    const divDelays = [1800, 2550, 3750, 5000, 6250, 7500, 8750, 10000];

    setTimeout(() => { document.getElementById('eyebrow').classList.add('visible'); }, 300);

    msgDelays.forEach((delay, i) => {
      setTimeout(() => { document.getElementById('msg-' + i).classList.add('visible'); }, delay);
    });
    divDelays.forEach((delay, i) => {
      setTimeout(() => { document.getElementById('div-' + i).classList.add('visible'); }, delay);
    });

    // Call 911 Again button appears first (at 1000ms), before the
    // disconnect message. Then the guidance messages follow.
    setTimeout(() => { document.getElementById('callAgain').classList.add('visible'); }, 1000);

    // Final buttons appear after div-7 settles (20000 + ~500ms)
    setTimeout(() => {
      const blockId = quickReachVisited ? 'finalBlockContinue' : 'finalBlockContact';
      document.getElementById(blockId).classList.add('visible');
    }, 10500);
  </script>

</body>
</html>
