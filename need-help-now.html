<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HELORA — Need Help?</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --card-surface:#0A0D12;
    --red:#CB3947;
    --blue:#4E82C9;
    --amber:#D39D35;
    --gray-text:#A8ADB5;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    background:var(--black);
    font-family:'Lato',sans-serif;
    color:#fff;
    min-height:100vh;
    width:100%;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:48px;
  }

  /* Header */
  header{
    width:100%;
    position:relative;
    line-height:0;
  }
  header img{
    width:100%;
    display:block;
  }
  .back-hotspot{
    position:absolute;
    top:0;
    left:0;
    width:22%;
    height:38%;
    background:transparent;
    border:none;
    cursor:pointer;
  }

  /* Body */
  main{
    width:100%;
    max-width:520px;
    padding:36px 22px 0;
    text-align:center;
  }
  h1{
    font-size:34px;
    font-weight:900;
    margin-bottom:14px;
  }
  .subtitle{
    color:var(--gray-text);
    font-size:16px;
    line-height:1.5;
    margin-bottom:32px;
  }

  /* Option cards */
  .option-card{
    display:flex;
    align-items:center;
    gap:18px;
    width:100%;
    background:var(--card-surface);
    border-radius:24px;
    padding:22px;
    margin-bottom:22px;
    text-align:left;
    cursor:pointer;
    border:2px solid transparent;
    -webkit-appearance:none;
    appearance:none;
    color:inherit;
    font-family:inherit;
    min-height:110px;
  }
  .option-card:active{
    transform:scale(0.98);
  }
  .option-card.red{
    border-color:var(--red);
    box-shadow:0 0 22px rgba(203,57,71,0.35), inset 0 0 30px rgba(203,57,71,0.08);
  }
  .option-card.amber{
    border-color:var(--amber);
    box-shadow:0 0 22px rgba(211,157,53,0.30), inset 0 0 30px rgba(211,157,53,0.08);
  }
  .icon-circle{
    flex-shrink:0;
    width:76px;
    height:76px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .icon-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .option-text{
    flex:1;
    min-width:0;
  }
  .option-title{
    font-size:22px;
    font-weight:900;
    margin-bottom:4px;
  }
  .option-line{
    font-size:15px;
    line-height:1.4;
    color:var(--gray-text);
  }
  .option-line.amber-highlight{
    color:var(--amber);
    font-weight:700;
  }
  .chevron{
    flex-shrink:0;
    width:22px;
    height:22px;
  }
  .chevron.red{ color:var(--red); }
  .chevron.amber{ color:var(--amber); }

  /* Footer */
  .divider{
    width:88%;
    max-width:460px;
    height:1px;
    background:rgba(255,255,255,0.15);
    margin:14px auto 22px;
  }
  footer{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    color:var(--gray-text);
    font-size:16px;
    font-weight:400;
    padding-bottom:8px;
  }
  footer svg{
    width:20px;
    height:20px;
    color:var(--red);
    flex-shrink:0;
  }
</style>
</head>
