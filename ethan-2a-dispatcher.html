<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>HELORA — Screen 2A (Ethan) · 911 Dispatcher</title>
<style>
  :root{
    --black:#000;
    --card:#0A0D12;
    --brand-navy:#253F6C;
    --brand-red:#C5152A;
    --act-red:#CB3947;
    --act-blue:#4E82C9;
    --act-amber:#D39D35;
    --white:#F4F6FA;
    --sub:#C9D2DE;
    --line:rgba(255,255,255,.28);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--black);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    color:var(--white);
  }
  .screen{
    max-width:430px;
    margin:0 auto;
    min-height:100svh;
    background:var(--black);
    padding:10px 16px calc(18px + env(safe-area-inset-bottom));
    display:flex;
    flex-direction:column;
    gap:clamp(14px,2.4vh,22px);
  }
  .lockup{
    position:relative;
    line-height:0;
  }
  .lockup-img{
    display:block;
    width:100%;
    height:auto;
  }
  .back{
    position:absolute;
    left:4%;
    top:33%;
    display:flex;align-items:center;gap:3px;
    color:var(--brand-red);
    font-weight:500;font-size:15px;
    cursor:pointer;
    background:transparent;
    border:none;
    font-family:inherit;
  }
  .back svg{width:14px;height:14px;stroke:var(--brand-red);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .status{
    display:flex;align-items:center;justify-content:center;gap:9px;
    padding:2px 0 0;
    overflow:hidden;
    max-height:60px;
    transition:opacity .45s ease,max-height .45s ease;
  }
  .status.ended{opacity:0;max-height:0;}
  .status .dot{
    width:11px;height:11px;border-radius:50%;
    background:var(--act-red);
    box-shadow:0 0 10px -1px rgba(203,57,71,.65);
  }
  .status .label{
    color:var(--act-red);
    font-size:clamp(18px,2.8vh,22px);
    font-weight:500;
    letter-spacing:.01em;
  }
  .hero{
    background:var(--card);
    border:2px solid var(--act-amber);
    border-radius:22px;
    padding:clamp(18px,3vh,26px) 20px clamp(22px,3.6vh,30px);
    text-align:center;
    overflow:hidden;
  }
  .hero .eyebrow{
    font-size:clamp(15px,2.2vh,18px);
    font-weight:400;
    letter-spacing:.06em;
    color:var(--white);
    margin-bottom:6px;
  }
  .hero .addr-street{
    font-size:clamp(19px,5.4vw,28px);
    font-weight:400;
    line-height:1.2;
    letter-spacing:.005em;
    overflow-wrap:break-word;
    word-break:break-word;
  }
  .hero .addr-city{
    font-size:clamp(16px,4.3vw,22px);
    font-weight:400;
    line-height:1.2;
    letter-spacing:.005em;
    margin-top:2px;
    overflow-wrap:break-word;
    word-break:break-word;
  }
  .hero .divider{
    height:1px;
    background:var(--line);
    margin:clamp(16px,2.8vh,24px) 4px;
  }
  .hero .num{
    font-size:clamp(24px,7.5vw,34px);
    font-weight:500;
    letter-spacing:.01em;
    margin-top:2px;
    overflow-wrap:break-word;
  }
  .actions{
    display:flex;
    flex-direction:column;
    gap:clamp(14px,2.4vh,22px);
  }
  .act{
    width:100%;
    background:var(--card);
    border:2px solid;
    border-radius:18px;
    padding:clamp(14px,2.4vh,20px) 22px clamp(16px,2.6vh,22px);
    text-align:center;
    cursor:pointer;
    transition:transform .15s ease;
    display:block;
  }
  .act:active{transform:scale(.985);}
  .act .title{
    font-size:clamp(28px,5vh,40px);
    font-weight:500;
    letter-spacing:.005em;
    line-height:1;
  }
  .act .rule{
    height:1px;
    background:var(--line);
    margin:clamp(10px,1.8vh,15px) 6px;
  }
  .act .sub{
    font-size:clamp(16px,2.6vh,21px);
    font-weight:400;
    color:var(--white);
    line-height:1.15;
  }
  .act.blue{border-color:var(--act-blue);}
  .act.blue .title{color:var(--act-blue);}
  .act.amber{border-color:var(--act-amber);}
  .act.amber .title{color:var(--act-amber);}
  .continue-btn{
    width:100%;
    background:transparent;
    color:var(--act-blue);
    box-shadow:inset 0 0 0 2px var(--act-blue);
    border:none;
    border-radius:18px;
    padding:clamp(14px,2.2vh,18px) 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-family:inherit;
    font-size:clamp(16px,2.6vh,19px);
    font-weight:500;
    letter-spacing:.01em;
    cursor:pointer;
    transition:transform .15s ease,background .15s ease;
  }
  .continue-btn:active{transform:scale(.985);background:rgba(78,130,201,.12);}
  .continue-btn svg{width:20px;height:20px;flex:0 0 auto;}
  .demo-bar{
    margin-top:auto;
    padding-top:18px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .demo-tag{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:rgba(201,210,222,.5);
  }
  .demo-btn{
    font-family:inherit;font-size:13px;letter-spacing:.03em;
    color:var(--sub);
    background:transparent;
    border:1px dashed rgba(255,255,255,.35);
    border-radius:999px;
    padding:8px 18px;
    cursor:pointer;
    transition:transform .15s ease;
  }
  .demo-btn:active{transform:scale(.98);}
  @media (prefers-reduced-motion: reduce){
    .act,.demo-btn,.status{transition:none;}
  }
</style>
</head>

        if(reduce){ statusEl.style.display = 'none'; return; }
        statusEl.classList.add('ended');
        statusEl.addEventListener('transitionend', onEnded);
      }
      function restoreCall(){
        btn.textContent = 'End 911 call (demo)';
        statusEl.style.display = '';
        if(reduce){ return; }
        void statusEl.offsetWidth;
        statusEl.classList.remove('ended');
      }
      btn.addEventListener('click', function(){
        connected = !connected;
        connected ? restoreCall() : endCall();
      });
    })();
  </script>
</body>
</html>
