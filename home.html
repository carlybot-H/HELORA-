<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HELORA — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#000000;
    --card-surface:#000000;
    --red:#CB3947;
    --blue:#4E82C9;
    --amber:#D39D35;
    --green-card:#4B6B4A;
    --green-reassure:#8FB37E;  /* HELORA muted green — reassurance line */
    --gray-sub:rgba(255,255,255,0.62);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--black);
    font-family:'Lato', -apple-system, BlinkMacSystemFont, sans-serif;
    color:#fff;
    -webkit-font-smoothing:antialiased;
  }

  body{
    padding-bottom:env(safe-area-inset-bottom);
  }

  .screen{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:#000;
    display:flex;
    flex-direction:column;
    padding:0 20px 32px;
  }

  /* Header lockup — real asset, back button removed, full-width by nature */
  .header{
    background:#000;
    margin:0;
    line-height:0;
  }

  .header img{
    display:block;
    width:100%;
    height:auto;
  }

  /* Title */
  h1.prompt{
    font-size:28px;
    font-weight:900;
    line-height:1.25;
    margin:28px 0 22px;
  }

  /* Cards */
  .cards{
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .card{
    display:flex;
    align-items:center;
    gap:16px;
    background:var(--card-surface);
    border-radius:20px;
    padding:18px 18px;
    border:1.5px solid var(--card-color);
    box-shadow:0 0 22px -6px var(--card-color);
    text-decoration:none;
    color:inherit;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color:transparent;
  }

  .card:active{
    transform:scale(0.98);
    box-shadow:0 0 12px -4px var(--card-color);
  }

  .icon-circle{
    flex:0 0 auto;
    width:84px;
    height:84px;
    border-radius:50%;
    overflow:hidden;
    background:#000;
  }

  .icon-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .card-text{
    flex:1 1 auto;
    min-width:0;
  }

  .card-title{
    font-size:21px;
    font-weight:900;
    letter-spacing:0.3px;
    margin:0 0 3px;
    text-transform:uppercase;
  }

  .card-sub{
    font-size:15px;
    color:rgba(255,255,255,0.72);
    font-weight:400;
    margin:0;
  }

  .chevron{
    flex:0 0 auto;
    width:20px;
    height:20px;
    stroke:var(--card-color);
    fill:none;
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .card.safe-journey{ --card-color:var(--blue); }
  .card.need-help{ --card-color:var(--red); }
  .card.everyday-help{ --card-color:var(--amber); }
  .card.prepare-learn{ --card-color:var(--green-card); }

  /* Footer reassurance */
  .reassure{
    margin-top:36px;
    text-align:center;
  }

  .reassure .line1{
    color:var(--green-reassure);
    font-weight:700;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }

  .reassure .line1 svg{
    width:16px;
    height:16px;
    stroke:var(--green-reassure);
    fill:none;
    stroke-width:2;
  }

  .reassure .line2{
    color:var(--gray-sub);
    font-size:14px;
    margin-top:4px;
    font-weight:400;
  }

  /* Share button */
  .share-btn{
    position:fixed;
    right:20px;
    bottom:calc(20px + env(safe-area-inset-bottom));
    width:52px;
    height:52px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .share-btn svg{
    width:22px;
    height:22px;
    stroke:#fff;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ transition:none; }
  }
</style>
</head>
